name: axiom-official/axiom-package-debugger
version: 0.1.0
language: python
description: Debugs failed Axiom package tests by reading the debug event stream and generating fix instructions.
author: Axiom Official
license: MIT
nodes:
    - name: PackageDebugReader
      description: Enriches the context by fetching the debug event stream for the test execution and attaching the events as JSON.
      input: PackageBuildContext
      output: PackageBuildContext
      required_secrets:
        - AXIOM_API_KEY
    - name: PackageTraceAnalyser
      description: Uses the LLM to analyse the debug trace, populates has_error, fix_instructions, and error_summary.
      input: PackageBuildContext
      output: PackageBuildContext
      required_secrets:
        - ANTHROPIC_API_KEY
    - name: PackageFixApplier
      description: Routes fix instructions to the appropriate package builder sub-flow and returns an AgentProgress with the result.
      input: PackageBuildContext
      output: AgentProgress
imports:
    - package: axiom-official/axiom-agent-messages
      version: 0.1.0
      messages:
        - NodeSpec
        - PackageBuildContext
        - AgentProgress
        - FlowBuildContext
        - AgentRequest
